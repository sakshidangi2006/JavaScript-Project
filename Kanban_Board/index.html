<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kanban Board</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<main>

<nav>
    <div class="left">
        <h1>Kanban</h1>
    </div>

    <div class="right">
        <button id="toggle-modal">Add New Task</button>
    </div>
</nav>


<section class="board">

    <!-- TODO COLUMN -->
    <div id="todo" class="task-column">

        <div class="heading">
            <div class="left">To Do</div>
            <div class="right">0</div>
        </div>

    </div>


    <!-- IN PROGRESS COLUMN -->
    <div id="progress" class="task-column">

        <div class="heading">
            <div class="left">In Progress</div>
            <div class="right">0</div>
        </div>

    </div>


    <!-- DONE COLUMN -->
    <div id="done" class="task-column">

        <div class="heading">
            <div class="left">Done</div>
            <div class="right">0</div>
        </div>

    </div>

</section>

</main>


<!-- ADD TASK MODAL -->

<div class="modal add-new-task">

    <div class="bg"></div>

    <div class="center">

        <input
            id="task-title-input"
            type="text"
            placeholder="Task Title"
            required
        >

        <textarea
            id="task-description-input"
            placeholder="Task Description"
            rows="4"
            required
        ></textarea>

        <button id="add-new-task">Add Task</button>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
